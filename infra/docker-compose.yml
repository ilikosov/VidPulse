version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: youtube-sync-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youtube_sync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: youtube-sync-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: youtube-sync-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/youtube_sync
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run db:generate --workspace=@youtube-sync/db && npm run db:push --workspace=@youtube-sync/db && npm run dev --workspace=@youtube-sync/api"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: youtube-sync-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/youtube_sync
      REDIS_HOST: redis
      REDIS_PORT: 6379
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run db:generate --workspace=@youtube-sync/db && npm run dev --workspace=@youtube-sync/worker"

volumes:
  postgres_data:
